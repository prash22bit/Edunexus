<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b3d"/>
      <stop offset="100%" style="stop-color:#1a3a7c"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <polygon points="32,10 48,17 32,24 16,17" fill="white" opacity="0.95"/>
  <rect x="44" y="17" width="2" height="8" rx="1" fill="white" opacity="0.8"/>
  <ellipse cx="45" cy="25" rx="2.5" ry="1.5" fill="white" opacity="0.8"/>
  <!-- E letter -->
  <text x="10" y="54" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" opacity="0.95">E</text>
  <!-- N letter with gradient -->
  <text x="33" y="54" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="url(#nGrad)">N</text>
</svg>